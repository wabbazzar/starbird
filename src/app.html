<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="theme-color" content="#0a4a52" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Starbird" />
		<meta
			name="description"
			content="Shop in line with your values. Track which brands align — and which don't."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Starbird" />
		<meta
			property="og:description"
			content="Shop in line with your values. Track which brands align — and which don't."
		/>
		<meta property="og:image" content="https://wabbazzar.github.io/starbird/logo-light.png" />
		<meta property="og:url" content="https://wabbazzar.github.io/starbird/" />
		<meta property="twitter:card" content="summary" />
		<meta property="twitter:title" content="Starbird" />
		<meta
			property="twitter:description"
			content="Shop in line with your values. Track which brands align — and which don't."
		/>
		<meta property="twitter:image" content="https://wabbazzar.github.io/starbird/logo-light.png" />
		<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<script>
			// Set theme ASAP so we don't flash the wrong palette.
			(function () {
				try {
					var stored = localStorage.getItem('starbird:theme');
					var prefersDark =
						window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
					var theme = stored || (prefersDark ? 'dark' : 'light');
					document.documentElement.setAttribute('data-theme', theme);
				} catch (e) {
					document.documentElement.setAttribute('data-theme', 'dark');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
