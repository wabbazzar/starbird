<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="theme-color" content="#0a4a52" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Starbird" />
		<meta
			name="description"
			content="Shop in line with your values. Track which brands align — and which don't."
		/>
		<!-- OG tags are set per-page via <svelte:head> so card pages can
		     have card-specific titles and descriptions for link unfurling.
		     Do NOT put generic OG tags here — they'd conflict with the
		     per-card tags and most crawlers use the first occurrence. -->
		<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<script>
			// Set theme ASAP so we don't flash the wrong palette.
			(function () {
				try {
					var stored = localStorage.getItem('starbird:theme');
					var prefersDark =
						window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
					var theme = stored || (prefersDark ? 'dark' : 'light');
					document.documentElement.setAttribute('data-theme', theme);
				} catch (e) {
					document.documentElement.setAttribute('data-theme', 'dark');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
